<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Game Menu</title>
        <link href="style.css" rel="stylesheet" type="text/css" >
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
        <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-app.js"></script>
        <!-- Add Firebase products that you want to use -->
        <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-auth.js"></script>
        <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-database.js"></script>
        <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-analytics.js"></script>
        <script src="fb_setup.js"></script>
        <script src="fb_io.js"></script>
        
    </head>
    <body>
        <div id="loadingOverlay">
                <div class="spinner"></div>
            </div>
        <header id="menuHeader">
            <div></div>
            <div id="welcomeMessage">

            </div>
            <div class="profileUserName" id="menuProfileUserName">
                <div id="userNameDisplayed">

                </div>
                <div id="profilePictureDisplayed">

                </div>
                <button id="changeUserDetailsButton" onclick="changeUserDetails()">Change Details?</button>
            </div>
            <button onclick="logOut()" id="logOutButton">Log Out</button>
        </header>
            
        <main>
            <dialog id="changeUserDetailsPopup">
                <div class="popupHead">
                    <h2>Change Details</h2>
                    <button id="changeUserDetailsClose" onclick="closePopup()">X</button>
                </div>
                <form>
                    <div>
                        <label for="newUsername">Username</label>
                        <input type="string" name="newUsername" id="newUsernameField">
                    </div>
                    <div>
                        <label for="newAge">Age</label>
                        <input name="newAge" type="number" id="newAgeField">
                    </div>
                </form>
                <button onclick="saveNewDetails()">Save</button>
            </dialog>
            <dialog id="saveDetailsPopup">
                <h2>Save changes first before closing?</h2>
                <div class="popupHead">
                    <button onclick="saveNewDetailsAndClose()" class="popupChangesButton">Save changes</button>
                    <button onclick="closePopupDontSave()" class="popupChangesButton">Discard changes</button>
                </div>
            </dialog>
            <div id="menuMain">
                <div id="gameButtonG1">
                    <button class="gameButtons" onclick="location.href='geodash1.html'">Geo Dash (Purple eddition)</button>
                </div>
                <div id="gameButtonG2">
                    <button class="gameButtons" onclick="location.href='geodash2.html'">Geo Dash (White eddition)</button>
                </div>

                <div id="topThreeG1">
                    <span class="topThreeTitles"><h3>GeoDash (Purple Eddition) Top Three</h3></span>
                    <div id="displayTopThreeG1" class="displayTopThree">
                        <div id="firstPlaceG1" class="firstPlace"> </div>
                        <div id ="secondPlaceG1" class="secondPlace"></div>
                        <div id="nothing"></div>
                        <div id="thirdPlaceG1" class="thirdPlace"></div>
                
                    </div>
                </div>
                <div id="topThreeG2">
                    <span class="topThreeTitles"><h3>GeoDash (White Eddition) Top Three</h3></span>
                    <div id="displayTopThreeG2" class="displayTopThree">
                        <div id="firstPlaceG2" class="firstPlace"> </div>
                        <div id = "secondPlaceG2" class="secondPlace"></div>
                        <div id="nothing"></div>
                        <div id="thirdPlaceG2" class="thirdPlace"></div>
            
                    </div> 
                </div>
            </div>

            

        
        </main>
        <footer>
            <p>All fonts by Google Fonts</p>

        </footer>
        <script src="register.js"></script>
        <script src="script.js"></script>
        

    </body>

</html>
