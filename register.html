<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Sign Up</title>
        <link href="style.css" rel="stylesheet" type="text/css" >
        <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-app.js"></script>
        <!-- Add Firebase products that you want to use -->
        <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-auth.js"></script>
        <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-database.js"></script>
        <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-analytics.js"></script>
        <script src="fb_setup.js"></script>
        <script src="fb_io.js"></script>
        
    </head>
    <body>
        <header>
            <h1>Sign Up</h1>
        </header>
        <main>
            <div id="registerMain">
                <div id="registerationParagraph">
                    <p>To create an account please enter your age and a username - (this is the name that will be visible to other users of this site)</p>
                </div>
                <div id="registerationNotice">
                    <p><b>NOTE: You must be 13 or older to use this site.</b></p>
                </div>
                <form>
                    <div id="registerationInputsParent">
                        <div id="userNameInput" class="registerationInputs">
                            <label for="username">Username:</label>
                            <input type="text"  name="username" id="usernamefield" required> 
                        </div>
                        <div id="ageInput" class="registerationInputs">
                            <label for="age">Age:</label>
                            <input type="number" name="age" id="agefield" required>
                        </div>
                    </div>
                </form>

                <button onclick="checkValidityOfInput()" class="registerationButtons">Submit</button>
                <button onclick="goToMenu()" class="registerationButtons">Next</button>
            </div>

        </main>
        <footer>

        </footer>
        <script src="register.js"></script>
    </body>
